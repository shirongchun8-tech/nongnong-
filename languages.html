<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Word Studio</title>
    <link rel="stylesheet" href="./src/styles.css?v=fluid-voice-redesign" />
    <link rel="stylesheet" href="./src/languages.css?v=fluid-voice-redesign" />
  </head>
  <body>
    <div id="language-app"></div>
    <script>
      window.__languageBootErrors = [];
      window.addEventListener("error", function (event) {
        window.__languageBootErrors.push({
          type: "error",
          message: event.message,
          filename: event.filename,
          lineno: event.lineno,
          colno: event.colno,
        });
      });
      window.addEventListener("unhandledrejection", function (event) {
        window.__languageBootErrors.push({
          type: "rejection",
          message: String(event.reason && (event.reason.stack || event.reason.message || event.reason)),
        });
      });
    </script>
    <script type="module" src="./src/languages.js?v=fluid-voice-redesign"></script>
  </body>
</html>
